<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PHD Logo 3D</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* ── Fondo con partículas sutiles ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 50%, rgba(180,20,20,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 30% 70%, rgba(100,10,10,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Escena 3D ── */
    .scene {
      perspective: 800px;
      perspective-origin: 50% 50%;
      width: 520px;
      height: 340px;
      cursor: grab;
    }
    .scene:active { cursor: grabbing; }

    /* ── Card flotante ── */
    .card {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg);
      transition: transform 0.08s ease-out;
      animation: float 4s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes float {
      0%, 100% { translate: 0 0px; }
      50%       { translate: 0 -18px; }
    }

    /* ── Cara frontal ── */
    .face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
    }

    .face-front {
      background: linear-gradient(145deg, #ffffff 0%, #f0f0f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 40px;
      border-radius: 20px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 2px 4px rgba(0,0,0,0.4),
        0 8px 24px rgba(0,0,0,0.5),
        0 0 60px rgba(180,20,20,0.15);
      overflow: hidden;
    }

    /* Brillo en la esquina superior */
    .face-front::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 100%);
      border-radius: 20px 20px 0 0;
      pointer-events: none;
    }

    /* Reflejo inferior sutil */
    .face-front::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(0deg, rgba(180,20,20,0.06) 0%, transparent 100%);
      border-radius: 0 0 20px 20px;
      pointer-events: none;
    }

    .logo-img {
      width: 100%;
      height: auto;
      max-height: 260px;
      object-fit: contain;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 12px rgba(180,20,20,0.25));
      transition: filter 0.3s ease;
    }

    /* ── Cara trasera (espejo oscuro) ── */
    .face-back {
      background: linear-gradient(145deg, #1a0505 0%, #0d0d0d 100%);
      transform: rotateY(180deg);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .face-back span {
      color: rgba(180,20,20,0.5);
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* ── Grosor 3D (borde lateral) ── */
    .edge-right {
      position: absolute;
      top: 10px; bottom: 10px;
      right: -12px;
      width: 12px;
      background: linear-gradient(to right, #c8c8c8, #a0a0a0);
      transform: rotateY(90deg) translateZ(0px);
      transform-origin: left center;
      border-radius: 0 4px 4px 0;
      backface-visibility: hidden;
    }
    .edge-bottom {
      position: absolute;
      left: 10px; right: 10px;
      bottom: -12px;
      height: 12px;
      background: linear-gradient(to bottom, #c8c8c8, #a0a0a0);
      transform: rotateX(-90deg) translateZ(0px);
      transform-origin: top center;
      border-radius: 0 0 4px 4px;
      backface-visibility: hidden;
    }

    /* ── Sombra dinámica ── */
    .shadow-wrapper {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 30px;
      background: radial-gradient(ellipse, rgba(180,20,20,0.3) 0%, transparent 70%);
      filter: blur(12px);
      animation: shadow-pulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shadow-pulse {
      0%, 100% { transform: translateX(-50%) scaleX(1);   opacity: 0.6; }
      50%       { transform: translateX(-50%) scaleX(0.75); opacity: 0.3; }
    }

    /* ── Partículas ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(180,20,20,0.4);
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Badge embed ── */
    .embed-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Partículas de fondo -->
  <div class="particles" id="particles"></div>

  <!-- Logo 3D -->
  <div class="scene" id="scene">
    <div class="card" id="card">
      <div class="face face-front">
        <img class="logo-img" src="phd-logo.png" alt="Premium Home Design"/>
      </div>
      <div class="face face-back">
        <span>Premium Home Design</span>
      </div>
      <div class="edge-right"></div>
      <div class="edge-bottom"></div>
    </div>
    <div class="shadow-wrapper"></div>
  </div>

  <div class="embed-hint">Move mouse to interact · Click to flip</div>

  <script>
    // ── Partículas generadas dinámicamente ──
    const container = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}%;
        animation-duration: ${6 + Math.random() * 10}s;
        animation-delay: ${-Math.random() * 12}s;
        opacity: ${0.2 + Math.random() * 0.5};
      `;
      container.appendChild(p);
    }

    // ── Tilt 3D con mouse ──
    const scene = document.getElementById('scene');
    const card  = document.getElementById('card');
    let isFlipped = false;
    let animFrame;

    let targetX = 0, targetY = 0;
    let currentX = 0, currentY = 0;

    document.addEventListener('mousemove', (e) => {
      if (isFlipped) return;
      const rect = scene.getBoundingClientRect();
      const cx   = rect.left + rect.width  / 2;
      const cy   = rect.top  + rect.height / 2;
      // Máximo ±20° de tilt
      targetX = ((e.clientY - cy) / (window.innerHeight / 2)) * -20;
      targetY = ((e.clientX - cx) / (window.innerWidth  / 2)) *  20;
    });

    // Suavizado con requestAnimationFrame
    function lerp(a, b, t) { return a + (b - a) * t; }

    function tick() {
      currentX = lerp(currentX, targetX, 0.08);
      currentY = lerp(currentY, targetY, 0.08);

      // Añadir la animación float con offset CSS
      const floatPhase = Math.sin(Date.now() / 2000) * 10; // ±10px
      card.style.transform = isFlipped
        ? `rotateY(180deg) rotateX(${currentX}deg)`
        : `rotateX(${currentX}deg) rotateY(${currentY}deg)`;

      // Glow dinámico según tilt
      const intensity = Math.abs(currentX) + Math.abs(currentY);
      card.querySelector('.logo-img').style.filter =
        `drop-shadow(0 ${4 + intensity * 0.3}px ${12 + intensity * 0.5}px rgba(180,20,20,${0.2 + intensity * 0.01}))`;

      animFrame = requestAnimationFrame(tick);
    }
    tick();

    // ── Click para flip ──
    scene.addEventListener('click', () => {
      isFlipped = !isFlipped;
      targetX = 0; targetY = 0;
      card.style.transition = 'transform 0.7s cubic-bezier(0.4,0,0.2,1)';
      card.style.transform  = isFlipped ? 'rotateY(180deg)' : 'rotateX(0deg) rotateY(0deg)';
      setTimeout(() => { card.style.transition = 'transform 0.08s ease-out'; }, 750);
    });

    // Al salir el mouse → volver al centro suavemente
    document.addEventListener('mouseleave', () => {
      targetX = 0; targetY = 0;
    });
  </script>
</body>
</html>
